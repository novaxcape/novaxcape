openapi: 3.0.0

info:
  title: Novaxcape Booking API
  version: 1.0.0
  description: Booking endpoints for Novaxcape, including booking creation and retrieval.

paths:
  /api/v1/booking/create/{touristId}/{packageId}:
    post:
      summary: Create a booking for a tourist package
      tags:
        - Booking
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: touristId
          required: true
          schema:
            type: string
            format: uuid
          description: Tourist ID
        - in: path
          name: packageId
          required: true
          schema:
            type: string
            format: uuid
          description: Package ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - visitDate
              properties:
                visitDate:
                  type: string
                  description: Date of visit in MM/DD/YYYY format
                  example: "06/15/2026"
      responses:
        "201":
          description: Booking created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BookingResponse'
        "400":
          description: Bad request; invalid visit date or installment not completed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "404":
          description: Client, Tourist, Package or Payment plan not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/booking/get-all:
    get:
      summary: Retrieve bookings for the authenticated client
      tags:
        - Booking
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: pageNumber
          required: false
          schema:
            type: integer
            default: 1
          description: Page number for pagination
        - in: query
          name: pageSize
          required: false
          schema:
            type: integer
            default: 10
          description: Number of bookings per page
      responses:
        "200":
          description: Bookings retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BookingListResponse'
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/booking/get-all/{touristId}/{packageId}:
    get:
      summary: Retrieve bookings for a specific tourist and package (vendor access)
      tags:
        - Booking
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: touristId
          required: true
          schema:
            type: string
            format: uuid
          description: Tourist ID
        - in: path
          name: packageId
          required: true
          schema:
            type: string
            format: uuid
          description: Package ID
        - in: query
          name: pageNumber
          required: false
          schema:
            type: integer
            default: 1
          description: Page number for pagination
        - in: query
          name: pageSize
          required: false
          schema:
            type: integer
            default: 10
          description: Number of bookings per page
      responses:
        "200":
          description: Bookings retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BookingListResponse'
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "403":
          description: Vendor access required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    Booking:
      type: object
      properties:
        id:
          type: string
          format: uuid
        clientId:
          type: string
          format: uuid
        touristId:
          type: string
          format: uuid
        packageId:
          type: string
          format: uuid
        bookingNumber:
          type: string
          example: "NOV-123456"
        visitDate:
          type: string
          format: date
          example: "2026-06-15"
        status:
          type: string
          enum:
            - camcelled
            - inProgress
            - installment
            - delivered
        tourist:
          type: object
          properties:
            id:
              type: string
              format: uuid
            centreName:
              type: string
              example: "Ocean View Tours"
        package:
          type: object
          properties:
            id:
              type: string
              format: uuid
            amount:
              type: number
              example: 45000
            packageName:
              type: string
              example: "Beach Escape"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    BookingResponse:
      type: object
      properties:
        message:
          type: string
        booking:
          $ref: '#/components/schemas/Booking'

    BookingListResponse:
      type: object
      properties:
        message:
          type: string
        count:
          type: integer
        data:
          type: array
          items:
            $ref: '#/components/schemas/Booking'
        pagination:
          type: object
          properties:
            pageNumber:
              type: integer
            pageSize:
              type: integer
            totalDocuments:
              type: integer
            totalPages:
              type: integer
            hasNextPage:
              type: boolean
            hasPreviousPage:
              type: boolean

    ErrorResponse:
      type: object
      properties:
        message:
          type: string
