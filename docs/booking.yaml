openapi: 3.0.0

info:
  title: Novaxcape Booking API
  version: 1.0.0
  description: Documentation for booking endpoints

paths:
  /api/v1/booking/create/{touristId}/{packageId}:
    post:
      summary: Create a booking for a client
      tags:
        - Booking
      security:
        - bearerAuth: []
      parameters:
        - name: touristId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: packageId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - visitDate
              properties:
                visitDate:
                  type: string
                  description: Date of visit in MM/DD/YYYY format
                  example: "06/15/2026"
      responses:
        "201":
          description: Booking created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BookingResponse'
        "400":
          description: Bad request
        "401":
          description: Unauthorized
        "404":
          description: Client, Tourist, or Package not found
        "500":
          description: Something went wrong

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    Booking:
      type: object
      properties:
        id:
          type: string
          format: uuid
        clientId:
          type: string
          format: uuid
        touristId:
          type: string
          format: uuid
        packageId:
          type: string
          format: uuid
        visitDate:
          type: string
          format: date

    BookingResponse:
      type: object
      properties:
        message:
          type: string
        booking:
          $ref: '#/components/schemas/Booking'
