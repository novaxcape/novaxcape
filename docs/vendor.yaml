openapi: 3.0.0

info:
  title: Novaxcape Vendor API
  version: 1.0.0
  description: Documentation for vendor endpoints

paths:
  /api/v1/vendor/register:
    post:
      summary: Register vendor
      tags:
        - Vendor


      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - centerName
                - email
                - phoneNumber
                - password
              properties:
                centerName:
                  type: string
                  example: "Lekki Conservation Centre"
                email:
                  type: string
                  example: "vendor@gmail.com"
                phoneNumber:
                  type: string
                  example: "09087654321"
                password:
                  type: string
                  example: "Password123@"
      responses:
        "201":
          description: Vendor registered successfully
        "400":
          description: Vendor already exists
        "500":
          description: Something went wrong

  /api/v1/vendor/verify-otp:
    post:
      summary: Verify vendor email
      tags:
        - Vendor
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - otp
              properties:
                email:
                  type: string
                  example: "vendor@gmail.com"
                otp:
                  type: string
                  example: "123456"
      responses:
        "200":
          description: Email verified successfully
        "400":
          description: Invalid OTP, expired OTP, or email already verified
        "404":
          description: Vendor not found
        "500":
          description: Something went wrong

  /api/v1/vendor/resend-otp:
    post:
      summary: Resend OTP
      tags:
        - Vendor
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
              properties:
                email:
                  type: string
                  example: "vendor@gmail.com"
      responses:
        "200":
          description: OTP resent successfully
        "400":
          description: Email already verified
        "404":
          description: Vendor not found
        "500":
          description: Something went wrong

  /api/v1/vendor/login:
    post:
      summary: Login vendor
      tags:
        - Vendor
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                  example: "vendor@gmail.com"
                password:
                  type: string
                  example: "Password123@"
      responses:
        "200":
          description: Login successful
        "400":
          description: Invalid credentials or email not verified
        "404":
          description: Invalid credentials
        "500":
          description: Something went wrong

  /api/v1/vendor/forget-password:
    post:
      summary: Forgot password
      tags:
        - Vendor
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
              properties:
                email:
                  type: string
                  example: "vendor@gmail.com"
      responses:
        "200":
          description: Forgot password successful
        "404":
          description: Vendor not found
        "500":
          description: Something went wrong

  /api/v1/vendor/reset-password:
    post:
      summary: Reset password
      tags:
        - Vendor
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                  example: "vendor@gmail.com"
                password:
                  type: string
                  example: "NewPassword123@"
      responses:
        "200":
          description: Password reset successful
        "404":
          description: Invalid credential
        "500":
          description: Something went wrong

  /api/v1/vendor/change-password:
    post:
      summary: Change password
      tags:
        - Vendor
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - oldPassword
                - newPassword
              properties:
                oldPassword:
                  type: string
                  example: "OldPassword123@"
                newPassword:
                  type: string
                  example: "NewPassword123@"
      responses:
        "200":
          description: Password changed successfully
        "400":
          description: Old password is invalid
        "401":
          description: Unauthorized
        "404":
          description: User not found
        "500":
          description: Something went wrong

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT




