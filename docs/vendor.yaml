tags:
  - name: Vendor
    description: Vendor Authentication and Dashboard APIs

/api/v1/vendor/register:
  post:
    tags:
      - Vendor
    summary: Register Vendor
    description: Register a new vendor and send OTP to email for verification.
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
              - centerName
              - email
              - phoneNumber
              - password
            properties:
              centerName:
                type: string
                example: Wonderland Resort
              email:
                type: string
                format: email
                example: vendor@example.com
              phoneNumber:
                type: string
                example: "08012345678"
              password:
                type: string
                example: Password@123
    responses:
      201:
        description: Vendor registered successfully
        content:
          application/json:
            schema:
              type: object
              properties:
                message:
                  type: string
                  example: Vendor registered successfully, Please check your email to verify OTP
      400:
        description: Vendor already exists

/api/v1/vendor/verify-otp:
  post:
    tags:
      - Vendor
    summary: Verify Vendor Email
    description: Verify vendor account using OTP sent to email.
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
              - email
              - otp
            properties:
              email:
                type: string
                format: email
                example: vendor@example.com
              otp:
                type: string
                example: "123456"
    responses:
      200:
        description: Email verified successfully
      400:
        description: Invalid or expired OTP
      404:
        description: Vendor not found

/api/v1/vendor/resend-otp:
  post:
    tags:
      - Vendor
    summary: Resend OTP
    description: Resend verification OTP to vendor email.
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
              - email
            properties:
              email:
                type: string
                format: email
                example: vendor@example.com
    responses:
      200:
        description: OTP resent successfully
      400:
        description: Email already verified
      404:
        description: Vendor not found

/api/v1/vendor/login:
  post:
    tags:
      - Vendor
    summary: Vendor Login
    description: Authenticate vendor and generate JWT token.
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
              - email
              - password
            properties:
              email:
                type: string
                format: email
                example: vendor@example.com
              password:
                type: string
                example: Password@123
    responses:
      200:
        description: Login successful
        content:
          application/json:
            schema:
              type: object
              properties:
                message:
                  type: string
                  example: Login successfull
                token:
                  type: string
                  example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
                vendor:
                  type: object
      400:
        description: Invalid credential
      404:
        description: Vendor not found

/api/v1/vendor/forget-password:
  post:
    tags:
      - Vendor
    summary: Forgot Password
    description: Send password reset OTP to vendor email.
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
              - email
            properties:
              email:
                type: string
                format: email
                example: vendor@example.com
    responses:
      200:
        description: Forgot password successful
      404:
        description: Vendor not found

/api/v1/vendor/reset-password:
  post:
    tags:
      - Vendor
    summary: Reset Password
    description: Reset vendor password using email.
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
              - email
              - password
            properties:
              email:
                type: string
                format: email
                example: vendor@example.com
              password:
                type: string
                example: NewPassword@123
    responses:
      200:
        description: Password reset successful
      404:
        description: Invalid credential

/api/v1/vendor/change-password:
  post:
    tags:
      - Vendor
    summary: Change Password
    description: Change vendor password after authentication.
    security:
      - bearerAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
              - oldPassword
              - newPassword
            properties:
              oldPassword:
                type: string
                example: Password@123
              newPassword:
                type: string
                example: NewPassword@123
    responses:
      200:
        description: Password changed successfully
      400:
        description: Old password is invalid
      404:
        description: Vendor not found
      401:
        description: Unauthorized

/api/v1/vendor/dashboard:
  get:
    tags:
      - Vendor
    summary: Vendor Dashboard Statistics
    description: Retrieve vendor dashboard statistics including requests, bookings, revenue, ticket types and visitor trends.
    security:
      - bearerAuth: []
    responses:
      200:
        description: Dashboard statistics retrieved successfully
        content:
          application/json:
            schema:
              type: object
              properties:
                message:
                  type: string
                  example: Vendor dashboard stats retrieved successfully
                data:
                  type: object
                  properties:
                    vendorName:
                      type: string
                      example: Wonderland Resort
                    requests:
                      type: object
                      properties:
                        today:
                          type: integer
                          example: 12
                        yesterday:
                          type: integer
                          example: 8
                    revenue:
                      type: object
                      properties:
                        today:
                          type: number
                          example: 50000
                        yesterday:
                          type: number
                          example: 35000
                    bookings:
                      type: object
                      properties:
                        today:
                          type: integer
                          example: 10
                        yesterday:
                          type: integer
                          example: 7
                        total:
                          type: integer
                          example: 120
                    ticketTypes:
                      type: object
                      properties:
                        breakdown:
                          type: array
                          items:
                            type: object
                            properties:
                              packageType:
                                type: string
                                example: Adult
                              count:
                                type: integer
                                example: 25
                        total:
                          type: integer
                          example: 50
                    visitorStats:
                      type: array
                      items:
                        type: object
                        properties:
                          date:
                            type: string
                            example: "2026-06-15"
                          visits:
                            type: integer
                            example: 12
                    ratings:
                      type: object
                      properties:
                        average:
                          type: number
                          nullable: true
                          example: null
                        count:
                          type: integer
                          example: 0
      401:
        description: Unauthorized
      404:
        description: Vendor not found

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT