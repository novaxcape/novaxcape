openapi: 3.0.0

info:
  title: Novaxcape Withdrawal API
  version: 1.0.0
  description: Documentation for withdrawal/payout endpoints

servers:
  - url: http://localhost:{port}
    description: Local server
    variables:
      port:
        default: "9955"
        description: Server port

security:
  - bearerAuth: []

paths:
  /api/v1/withdrawal/payout-funds/{touristId}:
    post:
      summary: Request withdrawal/payout of funds
      tags:
        - Withdrawal
      operationId: payoutFunds
      description: Initiate a fund withdrawal request. Requires vendor authentication and valid KYC data.
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: touristId
          required: true
          schema:
            type: string
            format: uuid
          description: ID of the tourist center to withdraw funds from
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - amount
              properties:
                amount:
                  type: number
                  description: Amount to withdraw (minimum ₦100)
                  example: 5000
      responses:
        "200":
          description: Withdrawal initiated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Withdrawal initiated successfully"
                  payout:
                    $ref: '#/components/schemas/Withdrawal'
                  walletBalance:
                    type: number
                    description: Updated wallet balance after withdrawal
                    example: 15000
        "400":
          description: Bad request - Invalid input or insufficient balance
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Insufficient balance"
        "404":
          description: Resource not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Tourist center not found"
        "401":
          description: Unauthorized - Token is missing or invalid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: "Payout initiation failed"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    Withdrawal:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: Withdrawal record ID
        touristId:
          type: string
          format: uuid
          description: Tourist center ID
        walletId:
          type: string
          format: uuid
          description: Wallet ID
        amount:
          type: number
          description: Withdrawal amount in NGN
        reference:
          type: string
          description: Unique withdrawal reference
        bankName:
          type: string
          description: Bank name for the withdrawal
        bankCode:
          type: string
          description: Bank code
        accountNumber:
          type: string
          description: Bank account number
        status:
          type: string
          enum: [processing, completed, failed, cancelled]
          description: Current status of the withdrawal
        providerReference:
          type: string
          description: Payment provider's transaction reference
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    ErrorResponse:
      type: object
      properties:
        message:
          type: string
