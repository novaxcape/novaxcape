openapi: 3.0.0

info:
  title: Novaxcape Tourist API
  version: 1.0.0
  description: Documentation for tourist center endpoints

paths:
  /api/v1/tourist/register/{vendorId}:
    post:
      summary: Register a new tourist center
      tags:
        - Tourist
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: vendorId
          required: true
          schema:
            type: string
            format: uuid
          description: Vendor ID for the authenticated vendor
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - centreName
                - location
                - description
                - city
                - state
                - facilitiesAndAmenities
                - dailySlotCapacity
                - installmentPayment
                - streetAddress
                - openingHours
                - images
                - termsAndCondition
                - privacyPolicy
              properties:
                centreName:
                  type: string
                  example: Lekki Conservation Centre
                location:
                  type: string
                  example: Lekki, Lagos
                description:
                  type: string
                  example: Nature reserve and recreational tourist center
                city:
                  type: string
                  example: Lagos
                state:
                  type: string
                  example: Lagos
                streetAddress:
                  type: string
                  example: KM 19 Lekki-Epe Expressway
                facilitiesAndAmenities:
                  type: string
                  description: JSON string or plain text list of facilities.
                  example: '["Parking","Restaurant","Guided tours"]'
                dailySlotCapacity:
                  type: integer
                  example: 250
                installmentPayment:
                  type: boolean
                  example: true
                openingHours:
                  type: string
                  description: JSON string or plain text opening hours. The controller parses valid JSON strings before saving.
                  example: '{"monday":{"isOpen":true,"openTime":"9:00 AM","closeTime":"5:00 PM"},"saturday":{"isOpen":true,"openTime":"10:00 AM","closeTime":"6:00 PM"}}'
                images:
                  type: array
                  items:
                    type: string
                    format: binary
                  description: Tourist center image files. The route accepts up to 10.
                termsAndCondition:
                  type: string
                  format: binary
                  description: Terms and condition document.
                privacyPolicy:
                  type: string
                  format: binary
                  description: Privacy policy document.
      responses:
        "201":
          description: Tourist center registered successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TouristResponse'
        "400":
          description: Bad request; missing required fields or files
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "403":
          description: Vendor access required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "404":
          description: Vendor not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/tourist/get-all-state/{state}:
    get:
      summary: Get tourist centers by state
      description: Returns all tourist centers registered in the requested state.
      tags:
        - Tourist
      parameters:
        - in: path
          name: state
          required: true 
          description: State to filter tourist centers by.
          schema:
            type: string
          example: Lagos
      responses:
        "200":
          description: Centers found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TouristListResponse'
        "404":
          description: No centers found in the requested state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/tourist/get-one/{id}:
    get:
      summary: Get a single tourist center by ID
      tags:
        - Tourist
      parameters:
        - in: path
          name: id
          required: true
          description: Tourist center ID
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Tourist center found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TouristResponse'
        "404":
          description: Tourist center not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/tourist/get-all-opening-hours/{openingHours}:
    get:
      summary: Get tourist centers by opening hours
      description: Returns all tourist centers with the requested opening hours string.
      tags:
        - Tourist
      parameters:
        - in: path
          name: openingHours
          required: true
          description: Opening hours value to filter tourist centers by.
          schema:
            type: string
      responses:
        "200":
          description: Centers found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TouristListResponse'
        "404":
          description: No centers found for the requested opening hours
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    Tourist:
      type: object
      properties:
        id:
          type: string
          format: uuid
        vendorId:
          type: string
          format: uuid
        centreName:
          type: string
        description:
          type: string
        city:
          type: string
        state:
          type: string
        location:
          type: string
        streetAddress:
          type: string
        facilitiesAndAmenities:
          type: string
        dailySlotCapacity:
          type: integer
        installmentPayment:
          type: boolean
        openingHours:
          type: string
        images:
          type: array
          items:
            type: object
            properties:
              secureUrl:
                type: string
              publicId:
                type: string
        imagesPublicUrl:
          type: array
          items:
            type: string
          example:
            - https://res.cloudinary.com/example/image1.jpg
            - https://res.cloudinary.com/example/image2.jpg
        termsAndCondition:
          type: object
          properties:
            secureUrl:
              type: string
            publicId:
              type: string
        termsAndConditionPublicUrl:
          type: array
          items:
            type: string
        privacyPolicy:
          type: object
          properties:
            secureUrl:
              type: string
            publicId:
              type: string
        privacyPolicyPublicUrl:
          type: array
          items:
            type: string
        role:
          type: string
          example: Tourist
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    TouristResponse:
      type: object
      properties:
        message:
          type: string
        data:
          $ref: '#/components/schemas/Tourist'

    TouristListResponse:
      type: object
      properties:
        message:
          type: string
        count:
          type: integer
        data:
          type: array
          items:
            $ref: '#/components/schemas/Tourist'

    ErrorResponse:
      type: object
      properties:
        message:
          type: string
