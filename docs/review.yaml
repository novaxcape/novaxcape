openapi: 3.0.0

info:
  title: Novaxcape Review API
  version: 1.0.0
  description: Documentation for review endpoints

paths:
  /api/v1/review:
    post:
      summary: Create a new review
      description: Create a review for the platform. Requires an authenticated client token.
      tags:
        - Review
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - ratings
                - fullName
                - email
                - addYourReview
              properties:
                ratings:
                  type: string
                  enum:
                    - '1'
                    - '2'
                    - '3'
                    - '4'
                    - '5'
                  example: '5'
                fullName:
                  type: string
                  example: Jane Doe
                email:
                  type: string
                  format: email
                  example: jane.doe@example.com
                addYourReview:
                  type: string
                  example: Great experience, very helpful staff!
      responses:
        "201":
          description: Review created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReviewResponse'
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "403":
          description: Client access required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/review/get-all-review:
    get:
      summary: Get all reviews
      description: Retrieve all reviews in descending order of creation.
      tags:
        - Review
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Reviews retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReviewListResponse'
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "403":
          description: Client access required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/review/get-one-review/{id}:
    get:
      summary: Get a review by ID
      description: Retrieve a single review by its unique identifier.
      tags:
        - Review
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          description: Review ID
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Review retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReviewResponse'
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "403":
          description: Client access required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "404":
          description: Review not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/review/get-rating-count/{ratings}:
    get:
      summary: Get reviews by rating
      description: Retrieve reviews matching the requested star rating.
      tags:
        - Review
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: ratings
          required: true
          description: Review rating value to filter by (1-5).
          schema:
            type: string
            enum:
              - '1'
              - '2'
              - '3'
              - '4'
              - '5'
      responses:
        "200":
          description: Reviews retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReviewListResponse'
        "400":
          description: No review found with the requested rating
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "403":
          description: Client access required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/review/get-rating-statistics:
    get:
      summary: Get rating statistics
      description: Return counts and percentage distribution for each star rating.
      tags:
        - Review
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Rating statistics retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReviewStatisticsResponse'
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "403":
          description: Client access required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    Review:
      type: object
      properties:
        id:
          type: string
          format: uuid
        ratings:
          type: string
          enum:
            - '1'
            - '2'
            - '3'
            - '4'
            - '5'
        fullName:
          type: string
        email:
          type: string
          format: email
        addYourReview:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    ReviewResponse:
      type: object
      properties:
        message:
          type: string
        data:
          $ref: '#/components/schemas/Review'

    ReviewListResponse:
      type: object
      properties:
        message:
          type: string
        count:
          type: integer
        data:
          type: array
          items:
            $ref: '#/components/schemas/Review'

    ReviewStatisticsResponse:
      type: object
      properties:
        success:
          type: boolean
        totalReviews:
          type: integer
        ratings:
          type: object
          additionalProperties:
            type: integer
        percentages:
          type: object
          additionalProperties:
            type: string

    ErrorResponse:
      type: object
      properties:
        message:
          type: string
