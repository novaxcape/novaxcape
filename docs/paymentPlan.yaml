openapi: 3.0.0

info:
  title: Novaxcape Payment Plan API
  version: 1.0.0
  description: Documentation for payment plan endpoints

paths:
  /api/v1/plan/create-plan/{packageId}:
    post:
      summary: Create a payment plan for a package
      tags:
        - PaymentPlan
      security:
        - bearerAuth: []
      parameters:
        - name: packageId
          in: path
          required: true
          description: Package ID for the payment plan
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - durationInMonths
                - frequency
              properties:
                durationInMonths:
                  type: integer
                  example: 3
                  description: Number of months for the plan duration
                frequency:
                  type: string
                  enum:
                    - weekly
                    - monthly
                  example: monthly
                  description: Billing frequency for installment payments
                currency:
                  type: string
                  example: NGN
                  description: Currency for the plan; defaults to NGN if omitted
      responses:
        "201":
          description: Payment plan created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentPlanResponse'
        "400":
          description: Payment plan already exists or bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "404":
          description: Package, tourist center, or installment-supporting center not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/plan/get-all/{packageId}:
    get:
      summary: Retrieve all payment plans for a package
      tags:
        - PaymentPlan
      security:
        - bearerAuth: []
      parameters:
        - name: packageId
          in: path
          required: true
          description: Package ID to fetch payment plans for
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Payment plans retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentPlanListResponse'
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    PaymentPlan:
      type: object
      properties:
        id:
          type: string
          format: uuid
        packageId:
          type: string
          format: uuid
        durationInMonths:
          type: integer
        frequency:
          type: string
          enum:
            - weekly
            - monthly
        totalAmount:
          type: number
        installmentAmount:
          type: number
        numberOfInstallments:
          type: integer
        installmentsPaid:
          type: integer
        amountPaid:
          type: number
        currency:
          type: string
        status:
          type: string
          enum:
            - active
            - completed
            - cancelled
            - defaulted
        startDate:
          type: string
          format: date-time
        nextPaymentDate:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    PaymentPlanResponse:
      type: object
      properties:
        message:
          type: string
        data:
          $ref: '#/components/schemas/PaymentPlan'

    PaymentPlanListResponse:
      type: object
      properties:
        message:
          type: string
        count:
          type: integer
        data:
          type: array
          items:
            $ref: '#/components/schemas/PaymentPlan'

    ErrorResponse:
      type: object
      properties:
        message:
          type: string
