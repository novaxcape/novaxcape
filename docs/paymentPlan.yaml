openapi: 3.0.0

info:
  title: Novaxcape Payment Plan API
  version: 1.0.0
  description: Documentation for payment plan endpoints

paths:
  /api/v1/plan/create-plan/{packageId}:
    post:
      summary: Create a payment plan for a package
      tags:
        - PaymentPlan
      security:
        - bearerAuth: []
      parameters:
        - name: packageId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - durationInMonths
                - frequency
              properties:
                durationInMonths:
                  type: integer
                  example: 3
                frequency:
                  type: string
                  enum: [weekly, monthly]
                  example: monthly
                currency:
                  type: string
                  example: NGN
      responses:
        "201":
          description: Payment plan created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentPlanResponse'
        "400":
          description: Payment plan already exists or bad request
        "404":
          description: Package not found
        "500":
          description: Something went wrong

components:
  schemas:
    PaymentPlan:
      type: object
      properties:
        id:
          type: string
          format: uuid
        packageId:
          type: string
          format: uuid
        durationInMonths:
          type: integer
        frequency:
          type: string
          enum: [weekly, monthly]
        totalAmount:
          type: integer
        installmentAmount:
          type: integer
        numberOfInstallments:
          type: integer
        installmentsPaid:
          type: integer
        amountPaid:
          type: number
        currency:
          type: string
        status:
          type: string
          enum: [active, completed, cancelled, defaulted]
        startDate:
          type: string
          format: date-time
        nextPaymentDate:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    PaymentPlanResponse:
      type: object
      properties:
        message:
          type: string
        data:
          $ref: '#/components/schemas/PaymentPlan'
