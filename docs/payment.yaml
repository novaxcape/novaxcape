openapi: 3.0.0

info:
  title: Novaxcape Payment API
  version: 1.0.0
  description: Documentation for payment endpoints

servers:
  - url: http://localhost:{port}
    description: Local server
    variables:
      port:
        default: "9955"
        description: Server port (updated from your .env PORT)

security:
  - bearerAuth: []

paths:
  /api/v1/payment/make-payment/{bookingId}:
    post:
      summary: Initialize a payment for a booking
      tags:
        - Payment
      operationId: initiatePayment
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: bookingId
          required: true
          schema:
            type: string
            format: uuid
          description: Booking ID for which to create the payment charge
      requestBody:
        description: (no body required) The endpoint uses the authenticated user and the bookingId path parameter to initialize the payment.
        required: false
      responses:
        "200":
          description: Payment initialized successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentInitResponse'
              examples:
                success:
                  value:
                    message: "payment initialized successfully"
                    data:
                      status: "success"
                      reference: "NOV-XCAPE-ABC123"
                      amount: 10000
                      currency: "NGN"
                      customer:
                        email: "user@example.com"
                        name: "John Doe"
                      redirect_url: "https://www.google.com"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "404":
          description: Booking or client not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/payment/verify-payment:
    get:
      summary: Verify a payment using the reference code
      tags:
        - Payment
      operationId: verifyPayment
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: reference
          required: true
          schema:
            type: string
          description: Payment reference returned by the payment initialization endpoint
      responses:
        "200":
          description: Payment verified successfully or failed payment details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentVerifyResponse'
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "404":
          description: Payment not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/payment/verify-webhook:
    post:
      summary: Webhook endpoint for payment provider callbacks
      tags:
        - Payment
      description: Receives webhook events from Korapay. This endpoint is typically called by the payment provider and does not require authentication.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                event:
                  type: string
                data:
                  type: object
      responses:
        "200":
          description: Webhook processed
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
        "400":
          description: Invalid payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    Payment:
      type: object
      properties:
        id:
          type: string
          format: uuid
        clientId:
          type: string
          format: uuid
        bookingId:
          type: string
          format: uuid
        amount:
          type: number
        reference:
          type: string
        status:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    PaymentInitResponse:
      type: object
      properties:
        message:
          type: string
        data:
          type: object
          properties:
            status:
              type: string
            reference:
              type: string
            amount:
              type: number
            currency:
              type: string
            customer:
              type: object
              properties:
                email:
                  type: string
                name:
                  type: string
            redirect_url:
              type: string
            notification_url:
              type: string
            transaction:
              type: object
            response:
              type: object
          example:
            message: "payment initialized successfully"
            data:
              status: "success"
              reference: "NOV-XCAPE-ABC123"
              amount: 10000
              currency: "NGN"
              customer:
                email: "user@example.com"
                name: "John Doe"
              redirect_url: "https://www.google.com"

    PaymentVerifyResponse:
      type: object
      properties:
        message:
          type: string
        data:
          type: object
          properties:
            status:
              type: string
            reference:
              type: string
            amount:
              type: number
            currency:
              type: string
            customer:
              type: object
              properties:
                email:
                  type: string
                name:
                  type: string
            transaction:
              type: object
            error:
              type: object

    ErrorResponse:
      type: object
      properties:
        message:
          type: string
