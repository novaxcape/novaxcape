openapi: 3.0.0

info:
  title: Novaxcape Payment API
  version: 1.0.0
  description: Documentation for booking payment initialization, verification, installment tracking, and webhook handling.

servers:
  - url: http://localhost:{port}
    description: Local server
    variables:
      port:
        default: "9955"
        description: Server port

security:
  - bearerAuth: []

paths:
  /api/v1/payment/make-payment/{bookingId}:
    post:
      summary: Initialize a payment for a booking
      tags:
        - Payment
      operationId: initiatePayment
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: bookingId
          required: true
          schema:
            type: string
            format: uuid
          description: Booking ID for which to create the payment charge
      responses:
        "200":
          description: Payment initialized successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentInitResponse'
        "400":
          description: All installments have already been paid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "404":
          description: Booking or client not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/payment/verify-payment:
    get:
      summary: Verify a payment using the reference code
      tags:
        - Payment
      operationId: verifyPayment
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: reference
          required: true
          schema:
            type: string
          description: Payment reference returned by the payment initialization endpoint
      responses:
        "200":
          description: Payment verified successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentVerifyResponse'
        "400":
          description: Payment verification failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "404":
          description: Payment not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/payment/installment-status/{bookingId}:
    get:
      summary: Retrieve installment payment status for a booking
      description: Returns the current installment progress for a booking, including how many payments have been completed and how much is due per installment.
      tags:
        - Payment
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: bookingId
          required: true
          schema:
            type: string
            format: uuid
          description: Booking ID
      responses:
        "200":
          description: Installment status retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InstallmentStatusResponse'
              example:
                message: "Installment status retrieved"
                data:
                  bookingId: "5f3b1d2c-7d4e-4c9f-8d2a-1b1c2d3e4f5a"
                  bookingNumber: "NOV-123456"
                  paymentMethod: "installment"
                  totalInstallments: 2
                  installmentsPaid: 1
                  totalAmount: 45000
                  amountPerInstallment: 22500
                  status: "installment"
                  payments:
                    - id: "pmt_001"
                      reference: "NOV-XCAPE-123456"
                      status: "success"
                      installmentNumber: 1
                      installmentOf: 2
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "404":
          description: Booking not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/payment/verify-webhook:
    post:
      summary: Webhook endpoint for payment provider callbacks
      tags:
        - Payment
      description: Receives webhook events from Korapay. This endpoint is typically called by the payment provider and does not require authentication.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                event:
                  type: string
                data:
                  type: object
      responses:
        "200":
          description: Webhook processed
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  status:
                    type: string
                  message:
                    type: string
        "400":
          description: Invalid payload or missing reference
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "401":
          description: Invalid webhook signature
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "404":
          description: No payment record found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    Payment:
      type: object
      properties:
        id:
          type: string
          format: uuid
        clientId:
          type: string
          format: uuid
        bookingId:
          type: string
          format: uuid
        amount:
          type: number
        reference:
          type: string
        status:
          type: string
        installmentNumber:
          type: integer
        installmentOf:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    PaymentInitResponse:
      type: object
      properties:
        message:
          type: string
        data:
          type: object
          properties:
            status:
              type: string
            reference:
              type: string
            amount:
              type: number
            currency:
              type: string
            customer:
              type: object
              properties:
                email:
                  type: string
                name:
                  type: string
            redirect_url:
              type: string
            transaction:
              type: object
            response:
              type: object

    PaymentVerifyResponse:
      type: object
      properties:
        message:
          type: string
        data:
          type: object
          properties:
            status:
              type: string
            reference:
              type: string
            amount:
              type: number
            currency:
              type: string
            customer:
              type: object
              properties:
                email:
                  type: string
                name:
                  type: string
            transaction:
              type: object
            error:
              type: object
              nullable: true
        otp:
          type: string
          description: One-time passcode returned when payment is successfully verified
          nullable: true
        visitDate:
          type: string
          format: date-time
          description: Visit date for the booking
          nullable: true
        bookingId:
          type: string
          description: Booking number/ID
          nullable: true
        location:
          type: string
          description: Location/centre name for the booking
          nullable: true
        amount:
          type: number
          nullable: true
        installmentNumber:
          type: integer
          nullable: true
        installmentsPaid:
          type: integer
          nullable: true
        totalInstallments:
          type: integer
          nullable: true
        fullyPaid:
          type: boolean
          nullable: true

    InstallmentStatusResponse:
      type: object
      properties:
        message:
          type: string
        data:
          type: object
          properties:
            bookingId:
              type: string
              format: uuid
            bookingNumber:
              type: string
            paymentMethod:
              type: string
            totalInstallments:
              type: integer
            installmentsPaid:
              type: integer
            totalAmount:
              type: number
            amountPerInstallment:
              type: number
            status:
              type: string
            payments:
              type: array
              items:
                $ref: '#/components/schemas/Payment'

    ErrorResponse:
      type: object
      properties:
        message:
          type: string
